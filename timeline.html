<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Timeline - Shuyi Ma</title>
    <link rel="stylesheet" href="style.css">

    <!-- TimelineJS CSS -->
    <link title="timeline-theme" rel="stylesheet"
        href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">

    <style>
        /* Timeline specific overrides to match your site */
        .tl-timeline {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #ffffff !important;
        }

        /* Clean Light Aesthetic */
        .tl-slide,
        .tl-slidenormal,
        .tl-timenav,
        .tl-timegroup,
        .tl-timegroup-message {
            background: #ffffff !important;
        }

        /* Content area background */
        .tl-storyslider {
            background-color: #ffffff !important;
        }

        /* Typography */
        .tl-headline {
            font-size: 42px !important;
            line-height: 1.2 !important;
            color: #333333 !important;
        }

        .tl-text p {
            font-size: 20px !important;
            line-height: 1.6 !important;
            color: #444444 !important;
        }

        .tl-caption {
            font-size: 14px !important;
            color: #666 !important;
        }

        /* Marker Styles */
        .tl-timemarker .tl-timemarker-content-container {
            background-color: #f9f9f9 !important;
            border-color: #ddd !important;
        }

        .tl-timemarker .tl-timemarker-content-container .tl-timemarker-text .tl-headline {
            font-size: 14px !important;
            color: #333 !important;
        }

        /* Filter Buttons Styles */
        .filter-button {
            background-color: #ffffff;
            border: 1px solid #ddd;
            color: #555;
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: all 0.2s ease;
            font-size: 16px;
            border-radius: 4px;
        }

        .filter-button:hover {
            background-color: #f5f5f5;
            border-color: #bbb;
        }

        .filter-button.active {
            background-color: #333;
            color: #fff;
            border-color: #333;
        }

        /* Correct alignment and remove the background wrapper specific to this page */
        body {
            background-color: #f4f4f4;
            /* Match site background */
            background-image: none !important;
            /* Remove any textures if not wanted, or keep if part of base */
        }

        /* Target the main container from style.css if it exists */
        body::before,
        .container,
        main {
            background: none !important;
            box-shadow: none !important;
        }

        h1,
        h2,
        h3 {
            font-family: Georgia, 'Times New Roman', serif;
        }

        /* Era Tracks Styles */
        .tl-era {
            opacity: 0.8 !important;
            border-bottom: 2px solid #ccc;
            height: 25px !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            overflow: visible !important;
        }

        .tl-era-track-1 {
            background-color: rgba(255, 200, 200, 0.4) !important;
            top: 110px !important;
        }

        /* China */
        .tl-era-track-2 {
            background-color: rgba(200, 255, 200, 0.4) !important;
            top: 140px !important;
        }

        /* Chosŏn */
        .tl-era-track-3 {
            background-color: rgba(200, 200, 255, 0.4) !important;
            top: 170px !important;
        }

        /* Japan */

        .tl-era-label {
            font-family: Georgia, serif !important;
            font-size: 11px !important;
            font-weight: bold !important;
            color: #444 !important;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Labels for the tracks themselves */
        .track-label {
            position: absolute;
            left: 10px;
            font-size: 10px;
            font-weight: bold;
            color: #888;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">About Me</a>
        <a href="publications.html">Publications</a>
        <a href="projects.html">Projects</a>
        <a href="resources.html">Resources</a>
        <a href="blog.html">Blog</a>
    </nav>

    <!-- Country Filter Buttons -->
    <div class="filter-container" style="text-align: center; margin: 20px 0; font-family: Georgia, serif;">
        <button class="filter-button active" onclick="filterTimeline('All')">All</button>
        <button class="filter-button" onclick="filterTimeline('China')">China</button>
        <button class="filter-button" onclick="filterTimeline('Korea')">Korea</button>
        <button class="filter-button" onclick="filterTimeline('Japan')">Japan</button>
    </div>

    <!-- Timeline Container: Full width breakout -->
    <div id="timeline-embed"
        style="width: 100vw; height: 850px; margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); box-shadow: none; background: #ffffff;">
    </div>

    <!-- TimelineJS Script -->
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
    <script src="timeline_data.js"></script>
    <script type="text/javascript">
        var currentTimeline;

        function initTimeline(data) {
            // Re-initialize TimelineJS
            currentTimeline = new TL.Timeline('timeline-embed', data, {
                hash_bookmark: false,
                initial_zoom: 2,
                timenav_height_percentage: 60, // Increased for era tracks
                font: null
            });

            // Post-load styling for eras
            setTimeout(processEras, 1000);
            // Also run on scroll/zoom as TimelineJS might re-render
            window.addEventListener('resize', processEras);
        }

        function processEras() {
            const eras = document.querySelectorAll('.tl-era');
            eras.forEach(era => {
                const headline = era.querySelector('.tl-headline');
                if (!headline) return;

                const text = headline.innerText;
                if (text.startsWith('CH:')) {
                    era.classList.add('tl-era-track-1');
                    headline.innerText = text.replace('CH:', '').trim();
                } else if (text.startsWith('KR:')) {
                    era.classList.add('tl-era-track-2');
                    headline.innerText = text.replace('KR:', '').trim();
                } else if (text.startsWith('JP:')) {
                    era.classList.add('tl-era-track-3');
                    headline.innerText = text.replace('JP:', '').trim();
                }

                era.classList.add('processed');
                headline.classList.add('tl-era-label');
            });

            // Add persistent track indicators if not already present
            const nav = document.querySelector('.tl-timenav');
            if (nav && !document.querySelector('.track-label')) {
                const l1 = document.createElement('div'); l1.className = 'track-label'; l1.innerText = 'China'; l1.style.top = '115px';
                const l2 = document.createElement('div'); l2.className = 'track-label'; l2.innerText = 'Chosŏn'; l2.style.top = '145px';
                const l3 = document.createElement('div'); l3.className = 'track-label'; l3.innerText = 'Japan'; l3.style.top = '175px';
                nav.appendChild(l1);
                nav.appendChild(l2);
                nav.appendChild(l3);
            }
        }

        function filterTimeline(tag) {
            // Update button styles
            const buttons = document.querySelectorAll('.filter-button');
            buttons.forEach(btn => {
                if (btn.innerText === tag) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            if (tag === 'All') {
                initTimeline(timelineData);
                return;
            }

            // Deep clone timelineData to avoid accidental mutation
            const filteredData = {
                title: timelineData.title,
                events: timelineData.events.filter(event =>
                    event.tags && event.tags.includes(tag)
                )
            };

            initTimeline(filteredData);
        }

        // Initial Load
        initTimeline(timelineData);
    </script>

    <footer>
        &copy; 2026 Shuyi Ma
    </footer>
</body>

</html>
